spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/medical_health?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
  # 关闭默认模板引擎（若不用）
  thymeleaf:
    enabled: false
  # Swagger 3.0.0 与 Spring Boot 2.7.x 兼容性配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# MyBatis-Plus配置（若使用）
mybatis-plus:
  type-aliases-package: com.example.medical.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl